version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: skillgap-mysql
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: skillgap_db
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3309:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skillgap-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/skillgap_db?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_HOST: db
      SPRING_DATASOURCE_DB: skillgap_db
    ports:
      - "9091:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
