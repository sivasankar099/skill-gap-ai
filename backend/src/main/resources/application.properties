# Database Configuration — defaults to a local file-based H2 database for development
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/skillgap_db;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA and Hibernate configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Execute schema.sql and data.sql scripts automatically at startup
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# File Upload Configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# JWT Properties
jwt.secret=9a4f2c5e7b8a1c3d6e5f2a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d
# 1 Day expiration (86,400,000 milliseconds)
jwt.expiration-ms=86400000

# Gemini API Configuration
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models

# Qdrant Vector DB Configuration
qdrant.url=${QDRANT_URL:http://localhost:6333}
qdrant.api.key=${QDRANT_API_KEY:}

# Server Port
server.port=${SERVER_PORT:8082}
